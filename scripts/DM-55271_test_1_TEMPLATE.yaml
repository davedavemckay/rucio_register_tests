# Run with `bps submitcmd DM-55271_test_1.yaml`
wmsServiceClass: "lsst.ctrl.bps.htcondor.HTCondorService"
computeSite: "TEMPLATE_COMPUTE_SITE"

site:
  TEMPLATE_COMPUTE_SITE_LOWERCASE:
    nodeset: "TEMPLATE_NODESET"
    bpsUseShared: false
    bpsUseRunTempSpace: true
    softwarePath: "/cvmfs/sw.lsst.eu/almalinux-x86_64/lsst_distrib/{lsstVersion}"

  bps_submit:
    bpsUseShared: true
    bpsUseRunTempSpace: false
    softwarePath: "/sdf/group/rubin/sw/w_latest"
    nodeset: "BPS_SUBMIT"
    customEnvSetup: >
      pushd /sdf/group/rubin/user/mgower/stages-53494/ctrl_bps;
      setup -j -r .;
      popd;
      pushd /sdf/group/rubin/user/mgower/stages-53494/ctrl_bps_htcondor;
      setup -j -r .;
      popd;

lsstVersion: "w_2026_23"
project: dev
campaign: rucio_parallel_tests
bpsMakeCommand: false
fileDistributionEndpoint: "${LSST_RUN_TEMP_SPACE}/bps_dev/payload/{uniqProcName}/"
submitCmd: True
numberOfRetries: 0

payload:
  payloadName: "TEMPLATE_TEST_NAME/{computeSite}"
  # Keep this collection in sync with the default COLLECTION in DM-55271_test_1.bash.
  inCollection: "TEMPLATE_COLLECTION"
  # dataQuery: "exposure = 34342 AND detector = 2"
  butlerConfig: "dp2_prep"

customJob:
  queue: ""
  requestCpus: 10
  requestMemory: 16000
  executable: "TEMPLATE_BASH_FILE"
  arguments: ""

finalJob:
  requestCpus: 10
  requestMemory: 16000

preparePayloadWorkflow:
  computeSite: bps_submit